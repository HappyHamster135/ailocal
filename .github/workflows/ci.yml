name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  windows:
    name: Build + test (Windows, full solution)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build AiLocal.Core
        run: dotnet build src/AiLocal.Core/AiLocal.Core.csproj -c Release

      - name: Build AiLocal.Node
        run: dotnet build src/AiLocal.Node/AiLocal.Node.csproj -c Release

      - name: Build AiLocal.App
        run: dotnet build src/AiLocal.App/AiLocal.App.csproj -c Release

      - name: Test
        run: dotnet test tests/AiLocal.Core.Tests/AiLocal.Core.Tests.csproj -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: tests/AiLocal.Core.Tests/TestResults/test-results.trx

  cross-platform:
    name: Build + test (Linux, cross-platform node engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # AiLocal.App is WinForms/WebView2 (net10.0-windows TFM) and is
      # intentionally excluded here - AiLocal.Core and AiLocal.Node are the
      # cross-platform Host/Worker/Overseer engine and are what a Linux/macOS
      # Worker actually runs (see LocalRuntimeManager's per-OS Ollama install paths).
      - name: Build AiLocal.Core
        run: dotnet build src/AiLocal.Core/AiLocal.Core.csproj -c Release

      - name: Build AiLocal.Node
        run: dotnet build src/AiLocal.Node/AiLocal.Node.csproj -c Release

      - name: Test
        run: dotnet test tests/AiLocal.Core.Tests/AiLocal.Core.Tests.csproj -c Release
